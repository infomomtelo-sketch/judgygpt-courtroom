<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Courtroom — JudgyGPT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #1f120b;
    --bg-elevated: #2a190f;
    --wood: #3a2418;
    --gold: #c9a14a;
    --gold-bright: #f4d77c;
    --u1: #7a93a8;
    --u2: #b08585;
    --text: #f3ece2;
    --text-dim: #b8a99a;
    --border: rgba(201, 161, 74, 0.25);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 18px;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 0 20px 140px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 28px 0 20px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 28px;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }

  header p {
    margin: 0;
    font-size: 14px;
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text-dim);
  }

  .session-info {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 14px;
    font-size: 13px;
    font-family: 'Inter', -apple-system, sans-serif;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-u1 { background: var(--u1); }
  .dot-u2 { background: var(--u2); }

  /* feed */
  .feed {
    flex: 1;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 4px 14px 14px 14px;
    font-size: 18px;
    line-height: 1.55;
    border-left: 3px solid transparent;
    background: var(--bg-elevated);
  }

  .msg .who {
    display: block;
    font-size: 12px;
    font-family: 'Inter', -apple-system, sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
    opacity: 0.75;
  }

  .msg.u1 { border-left-color: var(--u1); }
  .msg.u1 .who { color: var(--u1); }

  .msg.u2 {
    align-self: flex-end;
    border-left-color: var(--u2);
    border-radius: 14px 4px 14px 14px;
  }
  .msg.u2 .who { color: var(--u2); }

  /* Judgy verdict */
  .verdict {
    align-self: center;
    max-width: 92%;
    text-align: center;
    margin: 10px 0;
    padding: 18px 20px;
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    position: relative;
  }

  .verdict::before {
    content: '⚖';
    display: block;
    font-size: 18px;
    color: var(--gold-bright);
    margin-bottom: 8px;
    letter-spacing: 0.3em;
  }

  .verdict .who {
    display: block;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .verdict.interrupt {
    border-style: dashed;
    opacity: 0.96;
  }

  .verdict.interrupt .who {
    color: var(--gold-bright);
  }

  .verdict p {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-style: italic;
    line-height: 1.6;
    color: var(--text);
  }

  /* input */
  .composer {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    box-shadow: 0 -16px 24px -8px var(--bg);
    padding: 16px 0 24px;
  }

  .composer-inner {
    display: flex;
    gap: 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px 6px 6px 16px;
    align-items: flex-end;
  }

  .composer textarea {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 15px;
    resize: none;
    padding: 10px 0;
    max-height: 120px;
    outline: none;
    line-height: 1.4;
  }

  .composer textarea::placeholder { color: var(--text-dim); }

  .composer-inner button {
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    font-size: 18px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .composer-inner button:hover { background: var(--gold-bright); }
  .composer button:focus-visible,
  .as-toggle button:focus-visible { outline: 2px solid var(--gold-bright); outline-offset: 2px; }

  .composer-hint {
    display: block;
    width: 100%;
    text-align: center;
    font-size: 11px;
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--gold);
    margin-top: 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .composer-hint:hover { border-color: var(--gold); color: var(--gold-bright); }
  .composer-hint:disabled {
    color: var(--text-dim);
    cursor: default;
    border-color: var(--border);
  }

  /* "speaking as" toggle */
  .as-toggle {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .as-toggle button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: all 0.15s ease;
  }

  @media (max-width: 380px) {
    .as-toggle button { font-size: 11px; padding: 5px 10px; }
  }

  .as-toggle button.active.u1 { border-color: var(--u1); color: var(--u1); }
  .as-toggle button.active.u2 { border-color: var(--u2); color: var(--u2); }

  @media (prefers-reduced-motion: no-preference) {
    .msg, .verdict { animation: rise 0.25s ease-out; }
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>The Courtroom</h1>
    <p>Two sides. One verdict. Judgy presides.</p>
    <div class="session-info">
      <span class="pill"><span class="dot dot-u1"></span> You</span>
      <span class="pill" id="invitedPill"><span class="dot dot-u2"></span> Invited — waiting…</span>
    </div>
  </header>

  <div class="feed" id="feed">
    <div class="verdict">
      <span class="who">The Court is now in session</span>
      <p>Loading the case…</p>
    </div>
  </div>

  <div class="composer">
    <div class="as-toggle">
      <button class="active u1" id="asU1">Speaking as You</button>
      <button class="u2" id="asU2">Speaking as Invited</button>
    </div>
    <div class="composer-inner">
      <textarea id="input" placeholder="State your case…" rows="1"></textarea>
      <button id="send" aria-label="Send to the court">➤</button>
    </div>
    <button class="composer-hint" id="composerHint" type="button">Share this case's link to invite the other side</button>
  </div>

</div>

<script>
  // ---- Supabase setup ----
  const SUPABASE_URL = 'https://dmemzljerldzeiwqfxzp.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtZW16bGplcmxkemVpd3FmeHpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDMxNzgsImV4cCI6MjA5NDIxOTE3OH0.u4FL1mk555dUesVNjF58pXwkQlvvQYQgR5JpcxRtB40';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const feed = document.getElementById('feed');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const asU1 = document.getElementById('asU1');
  const asU2 = document.getElementById('asU2');
  const invitedPill = document.getElementById('invitedPill');
  const composerHint = document.getElementById('composerHint');

  let speakingAs = 'u1';
  let sessionId = null;
  let isInvitee = false;

  const OPENING_MESSAGE = "Court's in session — but it's just you and me right now. Ask me anything, vent, or tell me what's going on. I'll keep the seat warm for the other side.";

  asU1.addEventListener('click', () => setSpeaker('u1'));
  asU2.addEventListener('click', () => setSpeaker('u2'));

  function setSpeaker(who) {
    speakingAs = who;
    asU1.classList.toggle('active', who === 'u1');
    asU2.classList.toggle('active', who === 'u2');
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });

  composerHint.addEventListener('click', async () => {
    if (composerHint.disabled) return;
    try {
      await navigator.clipboard.writeText(window.location.href);
      const original = composerHint.textContent;
      composerHint.textContent = 'Link copied — send it to the other side';
      setTimeout(() => { composerHint.textContent = original; }, 2000);
    } catch (e) {
      composerHint.textContent = window.location.href;
    }
  });

  send.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---- Rendering ----
  function renderMessages(messages) {
    feed.innerHTML = '';
    if (!messages || messages.length === 0) {
      feed.appendChild(makeVerdict('The Court is now in session', OPENING_MESSAGE));
      return;
    }
    messages.forEach(m => {
      if (m.type === 'verdict' || m.type === 'interrupt' || m.type === 'reply') {
        let who = 'Judgy says';
        if (m.type === 'interrupt') who = '⚡ Judgy interrupts';
        if (m.type === 'verdict') who = 'The Bench Rules';
        const el = makeVerdict(who, m.text);
        if (m.type === 'interrupt') el.classList.add('interrupt');
        if (m.type === 'reply') el.classList.add('interrupt');
        feed.appendChild(el);
      } else {
        const div = document.createElement('div');
        div.className = `msg ${m.who}`;
        const label = m.who === 'u1' ? 'You' : 'Invited';
        div.innerHTML = `<span class="who">${label}</span>${escapeHtml(m.text)}`;
        feed.appendChild(div);
      }
    });
    window.scrollTo(0, document.body.scrollHeight);
  }

  function makeVerdict(who, text) {
    const div = document.createElement('div');
    div.className = 'verdict';
    div.innerHTML = `<span class="who">${who}</span><p>${escapeHtml(text)}</p>`;
    return div;
  }

  // ---- Session load / create ----
  async function init() {
    const params = new URLSearchParams(window.location.search);
    sessionId = params.get('case');

    if (!sessionId) {
      // New session — this browser is the inviter (u1)
      const { data, error } = await sb
        .from('courtroom_sessions')
        .insert({ messages: [] })
        .select()
        .single();

      if (error) {
        feed.innerHTML = '';
        feed.appendChild(makeVerdict('The Court cannot convene', 'Something went wrong starting this case. Please refresh and try again.'));
        console.error(error);
        return;
      }

      sessionId = data.id;
      const url = new URL(window.location.href);
      url.searchParams.set('case', sessionId);
      window.history.replaceState({}, '', url);
      renderMessages(data.messages);
      updateInvitedPill(data.invitee_joined);
    } else {
      // Existing session — load it
      isInvitee = true;
      setSpeaker('u2');

      const { data, error } = await sb
        .from('courtroom_sessions')
        .select()
        .eq('id', sessionId)
        .single();

      if (error || !data) {
        feed.innerHTML = '';
        feed.appendChild(makeVerdict('Case not found', "This case doesn't exist or may have ended."));
        return;
      }

      renderMessages(data.messages);
      updateInvitedPill(true); // this client IS the invitee
      composerHint.textContent = "You've joined this case. Speak freely.";
      composerHint.disabled = true;

      if (!data.invitee_joined) {
        await sb.from('courtroom_sessions')
          .update({ invitee_joined: true })
          .eq('id', sessionId);
      }
    }

    subscribeToSession();
  }

  function updateInvitedPill(joined) {
    if (joined) {
      invitedPill.innerHTML = '<span class="dot dot-u2"></span> Invited — joined';
    } else {
      invitedPill.innerHTML = '<span class="dot dot-u2"></span> Invited — waiting…';
    }
  }

  // ---- Realtime ----
  function subscribeToSession() {
    sb.channel(`session-${sessionId}`)
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'courtroom_sessions',
        filter: `id=eq.${sessionId}`
      }, (payload) => {
        renderMessages(payload.new.messages);
        updateInvitedPill(payload.new.invitee_joined);
      })
      .subscribe();
  }

  // ---- Sending ----
  const JUDGY_WORKER_URL = 'https://judgygpt-courtroom-a1.infomomtelo.workers.dev/judgy';

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || !sessionId) return;

    input.value = '';
    input.style.height = 'auto';

    const { data: current, error: fetchErr } = await sb
      .from('courtroom_sessions')
      .select('messages')
      .eq('id', sessionId)
      .single();

    if (fetchErr) { console.error(fetchErr); return; }

    const messages = current.messages || [];
    messages.push({ type: 'message', who: speakingAs, text });

    const { error } = await sb
      .from('courtroom_sessions')
      .update({ messages })
      .eq('id', sessionId);

    if (error) { console.error(error); return; }

    renderMessages(messages);
    await fetchJudgyResponse(messages);
  }

  async function fetchJudgyResponse(messages) {
    // Show a quick "thinking" placeholder
    const thinking = makeVerdict('⚖', '…');
    thinking.id = 'judgyThinking';
    feed.appendChild(thinking);
    window.scrollTo(0, document.body.scrollHeight);

    try {
      const res = await fetch(JUDGY_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });

      const judgyMsg = await res.json();
      document.getElementById('judgyThinking')?.remove();

      if (judgyMsg.error) {
        console.error(judgyMsg.error);
        feed.appendChild(makeVerdict('The Court is silent', "Judgy seems to be in chambers. Try again in a moment."));
        return;
      }

      // judgyMsg.type: "interrupt" | "verdict" | "reply"
      const validTypes = ['interrupt', 'verdict', 'reply'];
      const type = validTypes.includes(judgyMsg.type) ? judgyMsg.type : 'reply';
      const entry = { type, text: judgyMsg.text };
      messages.push(entry);

      await sb.from('courtroom_sessions')
        .update({ messages })
        .eq('id', sessionId);

      renderMessages(messages);
    } catch (e) {
      document.getElementById('judgyThinking')?.remove();
      console.error(e);
      feed.appendChild(makeVerdict('The Court is silent', "Couldn't reach Judgy. Check your connection and try again."));
    }
  }

  init();
</script>
</body>
</html>
